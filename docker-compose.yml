services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: deolhoneles
      POSTGRES_USER: deolhoneles
      POSTGRES_PASSWORD: deolhoneles
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deolhoneles"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
