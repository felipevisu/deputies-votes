server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /deputies {
        proxy_pass http://backend:8080;
    }

    location /feed {
        proxy_pass http://backend:8080;
    }

    location /accounts {
        proxy_pass http://backend:8080;
    }

    location /proposals {
        proxy_pass http://backend:8080;
    }

    location /votes {
        proxy_pass http://backend:8080;
    }
}
